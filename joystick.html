<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joystick</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Sarabun'; background: #0f172a; color: white; display: flex; justify-content: center; margin: 0; padding: 20px 0; }
        /* คุมความกว้างไม่ให้ล้นบนจอคอม/แท็บเล็ต */
        .container { width: 100%; max-width: 400px; padding: 0 20px; box-sizing: border-box; text-align: center; }
        
        input, select { width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; border-radius: 8px; box-sizing: border-box; text-align: center;}
        .btn { width: 100%; padding: 15px; font-size: 20px; font-weight: bold; background: #3b82f6; color: white; border: none; border-radius: 12px; cursor: pointer; }
        .rule { background: #ffe3e3; color: #d32f2f; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: bold; margin-bottom: 15px; line-height: 1.4; }
        .ans-btn { width: 100%; padding: 30px; font-size: 30px; font-weight: bold; margin: 10px 0; border: none; border-radius: 16px; color: white; cursor: pointer; }
        .ans-btn:disabled { opacity: 0.5; }
    </style>
    <script src="https://kruyanisa.github.io/classroom-core/quiz-config.js"></script>
</head>
<body>

<div class="container">
    <div id="login">
        <div class="rule">⚠️ กติกา: ห้ามคนเดิมถือมือถือติดกัน 2 ข้อ!<br>วนส่งให้เพื่อนในกลุ่มด้วยนะครับ</div>
        <h2 style="color: #10b981;">📱 จอยสติ๊ก (นักเรียน)</h2>
        <input type="text" id="pin" placeholder="ใส่รหัสห้อง 4 หลักจากกระดาน" maxlength="4" oninput="checkRoomValid()">
        <input type="text" id="name" placeholder="ชื่อตัวแทนกลุ่ม / ชื่อทีม">
        <select id="team">
            <option value="">-- กรุณากรอกรหัสห้องก่อนเลือกทีม --</option>
        </select>
        <button class="btn" style="margin-top:15px;" onclick="joinRoom()">เข้าเกม</button>
    </div>

    <div id="game" style="display: none;">
        <h3 id="t-name"></h3>
        <div id="status" style="color: #f59e0b; margin-bottom: 15px; font-weight:bold;">รอคุณครูเริ่มเกมบนจอใหญ่...</div>
        <button class="ans-btn" style="background:#06b6d4;" onclick="lock('in')" disabled>IN</button>
        <button class="ans-btn" style="background:#ec4899;" onclick="lock('on')" disabled>ON</button>
        <button class="ans-btn" style="background:#f97316;" onclick="lock('at')" disabled>AT</button>
    </div>
</div>

<script>
    let myPIN = "", myTeam = ""; let lastQ = 0; let verifiedCount = 0;

    async function checkRoomValid() {
        let pinVal = document.getElementById('pin').value;
        if(pinVal.length === 4 && verifiedCount !== pinVal) {
            let res = await fetch(QUIZ_CONFIG.SCRIPT_URL, { method:'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({action: 'team_get_status', pin: pinVal}) });
            let data = await res.json();
            if(data.success) {
                verifiedCount = pinVal; let select = document.getElementById('team'); select.innerHTML = '';
                let count = data.state.teamCount || 4;
                for(let i=0; i<count; i++) {
                    let char = String.fromCharCode(65 + i);
                    let opt = document.createElement('option'); opt.value = char; opt.innerText = `เข้ากลุ่ม Team ${char}`; select.appendChild(opt);
                }
            }
        }
    }

    async function joinRoom() {
        myPIN = document.getElementById('pin').value; let name = document.getElementById('name').value.trim(); myTeam = document.getElementById('team').value;
        if(!name || !myTeam || myPIN.length !== 4) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกรหัสห้อง ชื่อ และเลือกทีมครับ', 'warning'); return; }
        
        Swal.fire({ title: 'กำลังเข้าสู่ห้องเรียน...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
        let res = await fetch(QUIZ_CONFIG.SCRIPT_URL, { method:'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({action: 'team_join_room', pin: myPIN, team: myTeam, name: name}) });
        let data = await res.json();
        Swal.close();
        
        if(data.success) {
            document.getElementById('login').style.display = 'none'; document.getElementById('game').style.display = 'block';
            document.getElementById('t-name').innerText = `🎮 กลุ่มของคุณคือ: Team ${myTeam}`; setInterval(sync, 1500);
        } else Swal.fire('ล้มเหลว', data.msg, 'error');
    }

    async function sync() {
        let res = await fetch(QUIZ_CONFIG.SCRIPT_URL, { method:'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({action: 'team_get_status', pin: myPIN}) });
        let data = await res.json();
        if(data.success) {
            let state = data.state; if(state.teams[myTeam] === null) { location.reload(); return; }
            if(state.status === 'PLAYING' && state.currentQ !== lastQ) {
                lastQ = state.currentQ; document.getElementById('status').innerText = `🔥 ข้อที่ ${lastQ} ปรึกษากันแล้วส่งคำตอบเลย!`;
                document.querySelectorAll('.ans-btn').forEach(b => b.disabled = false);
            }
        }
    }

    async function lock(ans) {
        document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
        document.getElementById('status').innerText = `🔒 ล็อกคำตอบ ${ans.toUpperCase()} แล้ว! (ส่งให้เพื่อนข้อถัดไป)`;
        await fetch(QUIZ_CONFIG.SCRIPT_URL, { method:'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({action: 'team_lock_answer', pin: myPIN, team: myTeam, answer: ans}) });
    }
</script>
</body>
</html>
