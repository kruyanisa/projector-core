<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prepositions of Time Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun'; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 40px; border-radius: 16px; border: 2px solid #334155; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn { display: block; width: 100%; padding: 15px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 10px; cursor: pointer; margin: 15px 0; text-decoration: none; box-sizing: border-box; transition: 0.2s; }
        .btn:active { transform: translateY(4px); box-shadow: none !important; }
        .btn-single { background: #ec4899; box-shadow: 0 4px 0 #be185d; }
        .btn-team { background: #3b82f6; box-shadow: 0 4px 0 #1d4ed8; }
        .btn-back { background: #64748b; margin-top: 30px; box-shadow: 0 4px 0 #475569; }
        h1 { color: #38bdf8; margin-top: 0; font-size: 26px; }
    </style>
</head>
<body>

<div id="main-menu" class="box">
    <h1>🎮 เกมส์ Prepositions of time</h1>
    <p style="color: #94a3b8; margin-bottom: 30px;">เลือกโหมดการเล่น</p>
    
    <a href="ar-game.html" class="btn btn-single">👤 เล่นเดี่ยว</a>
    
    <button onclick="document.getElementById('main-menu').style.display='none'; document.getElementById('team-menu').style.display='block';" class="btn btn-team">👥 โหมดทีม</button>
</div>

<div id="team-menu" class="box" style="display: none;">
    <h1 style="color: #fbbf24;">👥 โหมดทีม</h1>
    <p style="color: #94a3b8; margin-bottom: 20px;">เลือกหน้าจอที่ต้องการเข้าใช้งาน</p>
    
    <a href="joystick.html" class="btn" style="background: #10b981; box-shadow: 0 4px 0 #059669;">📱 Joystick (นักเรียน)</a>
    <a href="projector.html" class="btn" style="background: #8b5cf6; box-shadow: 0 4px 0 #6d28d9;">🖥️ Projector (ครู)</a>
    
    <button onclick="document.getElementById('team-menu').style.display='none'; document.getElementById('main-menu').style.display='block';" class="btn btn-back">◀ กลับหน้าหลัก</button>
</div>

</body>
</html>
