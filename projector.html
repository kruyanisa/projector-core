<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Projector</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Sarabun'; background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); min-height: 100vh; margin: 0; padding: 20px; text-align: center; color: #1e3a8a; }
        .box { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 3px solid #fff; max-width: 900px; margin: auto; }
        .btn { padding: 15px 25px; font-size: 20px; font-weight: bold; background: linear-gradient(to bottom, #38bdf8, #0ea5e9); color: white; border: none; border-radius: 12px; cursor: pointer; margin: 10px; box-shadow: 0 6px 0 #0284c7; transition: 0.1s; font-family: 'Sarabun'; }
        .btn:active { transform: translateY(6px); box-shadow: none; }
        .btn-kick { background: #fda4af; font-size: 14px; padding: 5px 10px; margin-left: 10px; border: none; border-radius: 8px; color: #881337; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #f43f5e; }
        .pin-text { font-size: 90px; color: #f59e0b; font-weight: 800; letter-spacing: 8px; margin: 10px 0; text-shadow: 3px 3px 0 #fde68a; }
        .team-grid { display: grid; grid-template-columns: repeat(var(--cols, 2), 1fr); gap: 20px; margin-top: 20px; }
        .t-card { padding: 20px; border-radius: 16px; font-size: 22px; font-weight: bold; background: #f1f5f9; box-shadow: 0 8px 15px rgba(0,0,0,0.05); border: 2px solid #e2e8f0; }
        .timer { font-size: 70px; color: #ef4444; font-weight: 800; text-shadow: 2px 2px 0 #fca5a5; margin-bottom: 10px; }
        .instruction { font-size: 24px; color: #0ea5e9; font-weight: bold; background: #e0f2fe; display: inline-block; padding: 5px 20px; border-radius: 50px; margin-bottom: 10px; }
        .q-text { font-size: 55px; margin: 10px 0 30px 0; color: #1e3a8a; font-weight: 800; }
        select { padding: 12px; font-size: 18px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 2px solid #cbd5e1; outline: none; font-family: 'Sarabun'; font-weight: bold; color: #1e3a8a;}
        .music-btn { position: fixed; top: 20px; right: 20px; background: white; border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; z-index: 100; }
    </style>
    <script src="https://kruyanisa.github.io/classroom-core/quiz-config.js"></script>
</head>
<body>

<audio id="bgm" loop><source src="Mutibg.mp3" type="audio/mpeg"></audio>
<button class="music-btn" id="musicToggle" onclick="toggleMusic()">🎵</button>

<div id="setup" class="box">
    <h1 style="color: #0ea5e9; font-size: 40px;">🖥️ ควบคุมเกมโหมดทีม</h1>
    <p style="font-size: 20px;">เลือกจำนวนทีมที่ต้องการแบ่ง:</p>
    <select id="team-count-select">
        <option value="2">2 ทีม (A - B)</option>
        <option value="3">3 ทีม (A - C)</option>
        <option value="4" selected>4 ทีม (A - D)</option>
    </select>
    <br>
    <button class="btn" onclick="createRoom()">🚀 สร้างรหัสห้องเรียน</button>
</div>

<div id="lobby" class="box" style="display: none;">
    <h2>ให้นักเรียนเข้าจอยสติ๊ก แล้วใส่รหัสนี้</h2>
    <div class="pin-text" id="pin-display">----</div>
    <div class="team-grid" id="lobby-teams"></div>
    <button class="btn" style="background: linear-gradient(to bottom, #10b981, #059669); box-shadow: 0 6px 0 #047857; margin-top:30px;" onclick="startGame()">▶ เริ่มเกม (ล็อกห้อง)</button>
</div>

<div id="game" class="box" style="display: none;">
    <h2 id="q-num" style="color: #64748b;"></h2>
    <div class="instruction">📝 จงเลือกเติม IN, ON, หรือ AT ลงในช่องว่างให้ถูกต้อง</div>
    <div class="q-text" id="q-text"></div>
    <div class="timer" id="timer">15</div>
    <div class="team-grid" id="game-teams"></div>
    <button class="btn" id="next-btn" style="display:none; margin-top:20px;" onclick="nextQ()">ข้อถัดไป ▶</button>
</div>

<script>
    let isMusicPlaying = false;
    function toggleMusic() {
        let bgm = document.getElementById("bgm");
        if(isMusicPlaying) { bgm.pause(); document.getElementById("musicToggle").innerText = "🔇"; }
        else { bgm.play().catch(e=>{}); document.getElementById("musicToggle").innerText = "🎵"; }
        isMusicPlaying = !isMusicPlaying;
    }

    const questions = [
        {}, {q: "___ Friday afternoon", a: "on"}, {q: "___ the summer", a: "in"}, {q: "___ the morning", a: "in"}, {q: "___ Tuesday", a: "on"}, {q: "___ the afternoon", a: "in"}, {q: "___ midnight", a: "at"}, {q: "___ 3 o'clock", a: "at"}, {q: "___ night", a: "at"}, {q: "___ midday", a: "at"}, {q: "___ the evening", a: "in"}, {q: "___ November", a: "in"}, {q: "___ noon", a: "at"}, {q: "___ 2nd October", a: "on"}
    ];
    let roomPIN = ""; let currentQ = 1; let gameState = null; let timer = 15; let tId = null; let polling = null;
    let isChecking = false;

    async function api(payload) {
        let res = await fetch(QUIZ_CONFIG.SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
        return await res.json();
    }
    function showWait(msg) { Swal.fire({ title: msg, allowOutsideClick: false, didOpen: () => { Swal.showLoading() } }); }

    async function createRoom() {
        showWait('กำลังสร้างห้อง...');
        let tc = document.getElementById('team-count-select').value;
        let res = await api({ action: 'team_create_room', teamCount: tc });
        Swal.close();
        roomPIN = res.pin; gameState = res.state;
        document.getElementById('setup').style.display = 'none'; document.getElementById('lobby').style.display = 'block'; document.getElementById('pin-display').innerText = roomPIN;
        document.documentElement.style.setProperty('--cols', gameState.teamCount == 3 ? '3' : '2');
        polling = setInterval(sync, 1500);
        if(!isMusicPlaying) toggleMusic();
    }

    async function sync() {
        let res = await api({ action: 'team_get_status', pin: roomPIN });
        if(res.success) {
            gameState = res.state;
            if(gameState.status === 'LOBBY') renderLobby();
            if(gameState.status === 'PLAYING') {
                renderGameTeams();
                checkAllTeamsAnswered();
            }
        }
    }

    function checkAllTeamsAnswered() {
        if (timer <= 0 || isChecking) return;
        let activeTeams = ['A','B','C','D'].slice(0, gameState.teamCount);
        let allAnswered = true;
        activeTeams.forEach(t => { if (gameState.teams[t] && !gameState.answers[t]) allAnswered = false; });
        
        if (allAnswered) {
            isChecking = true;
            clearInterval(tId);
            document.getElementById('timer').innerText = "รอเฉลย...";
            document.getElementById('timer').style.color = "#f59e0b";
            setTimeout(() => { checkAnswers(); }, 1500); // หน่วง 1.5 วิ
        }
    }

    function renderLobby() {
        let html = ''; let targetTeams = ['A','B','C','D'].slice(0, gameState.teamCount);
        targetTeams.forEach(t => {
            let name = gameState.teams[t];
            if(name) html += `<div class="t-card" style="background:#a7f3d0; border-color:#34d399; color:#065f46;">Team ${t}: ${name} <button class="btn btn-kick" onclick="kick('${t}')">เตะ</button></div>`;
            else html += `<div class="t-card" style="background:#f1f5f9; color:#94a3b8;">Team ${t}: (ว่าง)</div>`;
        });
        document.getElementById('lobby-teams').innerHTML = html;
    }

    async function kick(team) { showWait('กำลังลบทีม...'); await api({ action: 'team_update_system', pin: roomPIN, kickTeam: team }); Swal.close(); }

    async function startGame() {
        showWait('กำลังเริ่มเกม...');
        await api({ action: 'team_update_system', pin: roomPIN, setStatus: 'PLAYING', currentQ: 1 });
        Swal.close();
        document.getElementById('lobby').style.display = 'none'; document.getElementById('game').style.display = 'block'; runQuestion();
    }

    function runQuestion() {
        isChecking = false; document.getElementById('next-btn').style.display = 'none'; 
        document.getElementById('q-num').innerText = `ข้อที่ ${currentQ} / 13`; 
        document.getElementById('q-text').innerHTML = questions[currentQ].q.replace('___', '<span style="color:#94a3b8;">___</span>');
        timer = 15; document.getElementById('timer').innerText = timer; document.getElementById('timer').style.color = "#ef4444";
        tId = setInterval(() => {
            timer--; document.getElementById('timer').innerText = timer;
            if(timer <= 0) { clearInterval(tId); checkAnswers(); }
        }, 1000);
    }

    function renderGameTeams() {
        if(timer <= 0) return; let html = ''; let targetTeams = ['A','B','C','D'].slice(0, gameState.teamCount);
        targetTeams.forEach(t => {
            if(!gameState.teams[t]) return;
            let ans = gameState.answers[t]; let status = ans ? '🔒 ส่งคำตอบแล้ว' : '⏳ กำลังคิด...'; 
            let bg = ans ? '#bae6fd' : '#f1f5f9'; let border = ans ? '#38bdf8' : '#e2e8f0';
            html += `<div class="t-card" style="background:${bg}; border-color:${border};">Team ${t} (${gameState.scores[t]} แต้ม)<br><span style="font-size:16px; color:#475569;">${status}</span></div>`;
        });
        document.getElementById('game-teams').innerHTML = html;
    }

    async function checkAnswers() {
        await sync();
        let correct = questions[currentQ].a; 
        document.getElementById('q-text').innerHTML = questions[currentQ].q.replace('___', `<span style="color:#10b981; text-decoration: underline;">${correct.toUpperCase()}</span>`);
        
        let addScores = {A:0, B:0, C:0, D:0}; let targetTeams = ['A','B','C','D'].slice(0, gameState.teamCount);
        targetTeams.forEach(t => { if(gameState.answers[t] === correct) addScores[t] = 1; });
        await api({ action: 'team_update_system', pin: roomPIN, addScores: addScores });
        
        let html = '';
        targetTeams.forEach(t => {
            if(!gameState.teams[t]) return;
            let isCorr = gameState.answers[t] === correct;
            let bg = isCorr ? '#a7f3d0' : '#fecaca'; let border = isCorr ? '#10b981' : '#ef4444'; let txt = isCorr ? '#065f46' : '#991b1b';
            html += `<div class="t-card" style="background:${bg}; border-color:${border}; color:${txt};">Team ${t} (${gameState.scores[t] + addScores[t]} แต้ม)<br><span style="font-size:18px;">ตอบ: ${gameState.answers[t] ? gameState.answers[t].toUpperCase() : 'ไม่ตอบ'}</span></div>`;
        });
        document.getElementById('game-teams').innerHTML = html; document.getElementById('next-btn').style.display = 'inline-block';
    }

    async function nextQ() {
        currentQ++;
        if(currentQ > 13) {
            document.getElementById('q-text').innerText = "🎉 จบเกมการแข่งขัน!"; document.getElementById('next-btn').style.display = 'none';
        } else {
            showWait('กำลังไปข้อถัดไป...');
            await api({ action: 'team_update_system', pin: roomPIN, currentQ: currentQ, clearAnswers: true });
            Swal.close(); runQuestion();
        }
    }
</script>
</body>
</html>
